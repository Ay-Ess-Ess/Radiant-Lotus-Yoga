name: Build Radiant Lotus Yoga

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest  # Windows so JavaFX -win.jar variants are used (same as your machine)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: RadiantLotusYoga
          path: target/RadiantLotusYoga-*.jar
